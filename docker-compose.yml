# ── Tattoo Center — full stack for local development / self-hosting ─────────
# Usage:
#   docker compose up --build      # start everything
#   docker compose down            # stop (add -v to also wipe data volumes)
#
# Open the site at  http://localhost:8080
# API is reachable at http://localhost:5000  (and proxied via the frontend)

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env            # your secrets (JWT, PayHere, admin, etc.)
    environment:
      # Override DB + port for the compose network (these win over .env)
      PORT: "5000"
      MONGO_URI: "mongodb://mongo:27017/tattoo-center"
      FRONTEND_URL: "http://localhost:8080"
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/public/uploads   # persist uploaded files
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        # Empty -> frontend uses relative "/api", proxied to backend by Nginx.
        VITE_API_URL: ""
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:-}"
        VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-}"
        VITE_ADMIN_KEY: "${VITE_ADMIN_KEY:-}"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
  uploads_data:
