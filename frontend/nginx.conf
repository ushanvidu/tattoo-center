server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for faster asset delivery
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API + uploads to the backend service (used by docker-compose).
    # Using a variable + Docker's internal resolver means Nginx starts even if
    # the backend isn't reachable yet, and only errors on an actual request.
    # In a split deployment (frontend on a CDN), set VITE_API_URL to an absolute
    # backend URL at build time and these proxy blocks are simply never hit.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend http://backend:5000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $backend http://backend:5000;
        proxy_pass $backend$request_uri;
    }

    # SPA fallback: serve index.html for any client-side route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
